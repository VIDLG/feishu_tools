pre-commit:
  parallel: true
  commands:
    fmt:
      root: "."
      run: just fmt-check

pre-push:
  parallel: true
  commands:
    clippy:
      root: "."
      run: just clippy-deny
    test:
      root: "."
      run: just test
    release-tag-version:
      root: "."
      # Reads stdin from git push; only fails when pushing a v* tag that
      # does not match Cargo.toml's package.version.
      run: just ci-check-release-tag-version
